apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  interval: 5m
  chart:
    spec:
      chart: oauth2-proxy
      version: 6.23.1
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 5m
  values:
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: nginx
      path: /oauth2
      hosts: 
        - &host auth.${DOMAIN}
      tls:
        - hosts:
          - *host
          secretName: oauth2-tls
    extraArgs:
      provider: oidc
      oidc-issuer-url: https://${AUTH0_DOMAIN}
      cookie-domain: .${DOMAIN}
      whitelist-domain: .${DOMAIN}
  valuesFrom:
  - kind: Secret
    name: auth0
    optional: false
